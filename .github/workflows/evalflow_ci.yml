name: Evalflow CI — Pull, Merge Evalflow CI — Pull, Merge & Publish Publish

on:
  # Trigger manually with your notebook slug and dataset details
  workflow_dispatch:
    inputs:
      notebook_slug:
        description: "Kaggle notebook slug (username/notebook-name)"
        required: true
      notebook_version:
        description: "Notebook version to pull (blank = latest)"
        required: false
        default: ""
      dataset_slug:
        description: "Kaggle dataset slug to publish to (url-safe, no spaces)"
        required: true
      dataset_title:
        description: "Human-readable dataset title"
        required: true
      dataset_description:
        description: "Dataset description"
        required: false
        default: "Benchmark results generated by Evalflow."
      update_existing:
        description: "Update existing dataset? (true/false)"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]

  schedule:
    - cron: "0 6 * * *"   # every day at 08:00 EET (UTC+2) / 09:00 EEST (UTC+3)

env:
  PYTHON_VERSION: "3.11"

jobs:
  # ------------------------------------------------------------------ #
  #  Scheduled: run all manifest watchers daily                        #
  # ------------------------------------------------------------------ #
  monitor:
    name: Daily monitor — all watchers
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor (all watchers)
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY:      ${{ secrets.KAGGLE_KEY }}
          OUTPUT_DIR:      outputs
        run: python monitor.py --all

      - name: Upload merged CSVs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evalflow-monitor-${{ github.run_id }}
          path: |
            outputs/evalflow_sft.csv
            outputs/evalflow_preferences.csv
          retention-days: 90

  # ------------------------------------------------------------------ #
  #  Manual: Pull → Merge → Publish a specific notebook               #
  # ------------------------------------------------------------------ #
  run:
    name: Pull ${{ github.event.inputs.notebook_slug }}
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install pandas python-dotenv kaggle

      - name: Pull, merge & publish
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY:      ${{ secrets.KAGGLE_KEY }}
          OUTPUT_DIR:      outputs
        run: |
          python ci_runner.py \
            --slug    "${{ github.event.inputs.notebook_slug }}" \
            --version "${{ github.event.inputs.notebook_version }}" \
            --output-dir outputs \
            --merge \
            --publish \
            --dataset-slug  "${{ github.event.inputs.dataset_slug }}" \
            --dataset-title "${{ github.event.inputs.dataset_title }}" \
            --dataset-description "${{ github.event.inputs.dataset_description }}" \
            ${{ github.event.inputs.update_existing == 'true' && '--update' || '' }}

      - name: Upload merged CSVs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: evalflow-merged-${{ github.run_id }}
          path: |
            outputs/evalflow_sft.csv
            outputs/evalflow_preferences.csv
          retention-days: 90

      - name: Write job summary
        run: |
          echo "## ✅ Evalflow CI complete" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Notebook | \`${{ github.event.inputs.notebook_slug }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Dataset  | \`${{ github.event.inputs.dataset_slug }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| URL | https://www.kaggle.com/datasets/${{ secrets.KAGGLE_USERNAME }}/${{ github.event.inputs.dataset_slug }} |" >> $GITHUB_STEP_SUMMARY

      - name: Comment on commit
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              commit_sha: context.sha,
              body: [
                `## 🏆 Evalflow CI`,
                `| | |`,
                `|---|---|`,
                `| Notebook | \`${{ github.event.inputs.notebook_slug }}\` |`,
                `| Dataset  | [\`${{ github.event.inputs.dataset_slug }}\`](https://www.kaggle.com/datasets/${{ secrets.KAGGLE_USERNAME }}/${{ github.event.inputs.dataset_slug }}) |`,
              ].join('\n'),
            });
